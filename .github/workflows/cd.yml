name: CD

on:
  push:
    branches: [main]

jobs:
  # Сначала прогоняем CI
  ci:
    name: Run CI before deploy
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # Деплой только если CI прошёл
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 10

    steps:
      - name: Trigger Railway Deploy
        run: |
          echo "🚀 Triggering deploy..."
          curl -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}" \
            -w "\nStatus: %{http_code}\n"

      - name: Wait for deployment (health check)
        run: |
          echo "⏳ Waiting for API..."

          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' ${{ secrets.API_URL }})

            if [ "$STATUS" -eq 200 ]; then
              echo "✅ API is up!"
              exit 0
            fi

            echo "Attempt $i failed (status: $STATUS)"
            sleep 10
          done

          echo "❌ Deployment failed"
          exit 1